<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Previewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #232323; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-container { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(40, 40, 40, 0.9); padding: 15px; border-radius: 8px; color: white; }
        button { background: #2563eb; border: none; color: white; padding: 8px 12px; margin: 4px; cursor: pointer; border-radius: 4px; }
        button.active { background: #dc2626; }
        #measurement-label { position: absolute; top: 120px; left: 20px; color: #00ff00; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-container">
        <input type="file" id="file-input" accept=".gltf,.glb" style="display:none">
        <label for="file-input" style="background:#2563eb; padding:8px; cursor:pointer">Load Model</label>
        <br><br>
        <button id="btn-grid">Toggle Grid</button>
        <button id="btn-measure">Measure Tool</button>
        <div id="model-info">Load a model to begin.</div>
    </div>
    
    <div id="measurement-label"></div>
    <div id="canvas-container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ======================
// Scene Setup
// ======================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x232323);

const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(0, 3, 6);

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.localClippingEnabled = true;

document
    .getElementById('canvas-container')
    .appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ======================
// Lighting
// ======================
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// ======================
// Grid
// ======================
const gridHelper = new THREE.GridHelper(
    10,
    10,
    0x00ff00,
    0x222222
);

gridHelper.visible = false;
scene.add(gridHelper);

// Toggle Grid
const gridToggle = document.getElementById('toggle-grid');
if (gridToggle) {
    gridToggle.addEventListener('change', (e) => {
        gridHelper.visible = e.target.checked;
    });
}

// ======================
// Variables
// ======================
const loader = new GLTFLoader();
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let model = null;
let boxHelper = null;

let measureMode = false;
let measurementPoints = [];
let measurementLine = null;

// ======================
// Measure Tool
// ======================
const measureToggle = document.getElementById('toggle-measure');

if (measureToggle) {
    measureToggle.addEventListener('change', (e) => {
        measureMode = e.target.checked;

        measurementPoints = [];

        if (measurementLine) {
            scene.remove(measurementLine);
            measurementLine = null;
        }
    });
}

window.addEventListener('click', (event) => {

    if (!measureMode || !model) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObject(model, true);

    if (intersects.length === 0) return;

    measurementPoints.push(intersects[0].point);

    if (measurementPoints.length > 2) {
        measurementPoints.shift();
    }

    if (measurementPoints.length === 2) {

        if (measurementLine) {
            scene.remove(measurementLine);
        }

        const geometry =
            new THREE.BufferGeometry().setFromPoints(
                measurementPoints
            );

        measurementLine = new THREE.Line(
            geometry,
            new THREE.LineBasicMaterial({
                color: 0xff0000
            })
        );

        scene.add(measurementLine);

        const distance =
            measurementPoints[0].distanceTo(
                measurementPoints[1]
            );

        document.getElementById(
            'measurement-label'
        ).innerText =
            `Distance: ${distance.toFixed(2)} units`;

        console.log(
            `Distance: ${distance.toFixed(2)} units`
        );
    }
});

// ======================
// Clipping Plane
// ======================
const clippingPlane = new THREE.Plane(
    new THREE.Vector3(-1, 0, 0),
    0
);

// ======================
// Load GLB / GLTF
// ======================
document
    .getElementById('file-input')
    .addEventListener('change', (e) => {

        const file = e.target.files[0];

        if (!file) return;

        const url = URL.createObjectURL(file);

        loader.load(url, (gltf) => {

            // Remove old model
            if (model) {
                scene.remove(model);
            }

            if (boxHelper) {
                scene.remove(boxHelper);
            }

            model = gltf.scene;
            scene.add(model);

            // Apply clipping plane
            model.traverse((child) => {

                if (child.isMesh) {

                    child.material.clippingPlanes = [
                        clippingPlane
                    ];

                    child.material.clipShadows = true;
                }
            });

            // Bounding Box
            boxHelper = new THREE.BoxHelper(
                model,
                0xffff00
            );

            scene.add(boxHelper);

            // Auto frame model
            const box = new THREE.Box3()
                .setFromObject(model);

            const center = box.getCenter(
                new THREE.Vector3()
            );

            const size = box.getSize(
                new THREE.Vector3()
            );

            const maxDim = Math.max(
                size.x,
                size.y,
                size.z
            );

            camera.position.set(
                maxDim,
                maxDim,
                maxDim
            );

            controls.target.copy(center);
            controls.update();

            document.getElementById(
                'model-info'
            ).innerText =
                `Model Loaded`;
        });
    });

// ======================
// Camera Views
// ======================
function setCameraView(view) {

    if (!model) return;

    const box = new THREE.Box3()
        .setFromObject(model);

    const center = box.getCenter(
        new THREE.Vector3()
    );

    const size = box.getSize(
        new THREE.Vector3()
    );

    const distance =
        Math.max(size.x, size.y, size.z) * 2;

    switch (view) {

        case 'front':
            camera.position.set(
                center.x,
                center.y,
                center.z + distance
            );
            break;

        case 'top':
            camera.position.set(
                center.x,
                center.y + distance,
                center.z
            );
            break;

        case 'left':
            camera.position.set(
                center.x - distance,
                center.y,
                center.z
            );
            break;

        case 'right':
            camera.position.set(
                center.x + distance,
                center.y,
                center.z
            );
            break;

        case 'iso':
            camera.position.set(
                center.x + distance,
                center.y + distance,
                center.z + distance
            );
            break;
    }

    controls.target.copy(center);
    controls.update();
}

// Example buttons
document.getElementById('front-view')?.addEventListener(
    'click',
    () => setCameraView('front')
);

document.getElementById('top-view')?.addEventListener(
    'click',
    () => setCameraView('top')
);

document.getElementById('iso-view')?.addEventListener(
    'click',
    () => setCameraView('iso')
);

// ======================
// Resize
// ======================
window.addEventListener('resize', () => {

    camera.aspect =
        window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

// ======================
// Animation Loop
// ======================
function animate() {

    requestAnimationFrame(animate);

    controls.update();

    if (boxHelper && model) {
        boxHelper.update();
    }

    renderer.render(scene, camera);
}

animate();
    </script>
</body>
</html>
